<!-- Floating Chat Widget -->
<div x-data="chatWidget()" x-init="init()" x-cloak
     class="fixed bottom-5 right-5 z-50"
     @keydown.escape.window="if(open) open = false">

    <!-- Chat Bubble (closed state) -->
    <button x-show="!open" @click="open = true; $nextTick(() => scrollToBottom())"
            class="w-14 h-14 bg-gradient-to-r from-emerald-600 to-teal-600 rounded-full shadow-lg hover:shadow-xl flex items-center justify-center transition-all hover:scale-105 relative group">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <!-- Unread indicator -->
        <span x-show="hasUnread" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full border-2 border-white"></span>
        <!-- Tooltip -->
        <span class="absolute bottom-full right-0 mb-2 px-2 py-1 bg-gray-900 text-white text-xs rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
            Site Assistant
        </span>
    </button>

    <!-- Chat Panel (open state) -->
    <div x-show="open" x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95"
         class="w-[400px] h-[550px] bg-white rounded-xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-4 py-3 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3"/>
                </svg>
                <span class="text-white font-semibold text-sm">Assistant</span>
                <!-- Context badge -->
                <span x-show="contextLabel" x-text="contextLabel"
                      class="text-xs bg-white/20 text-white px-2 py-0.5 rounded-full truncate max-w-[160px]"></span>
            </div>
            <div class="flex items-center gap-1">
                <!-- Sessions dropdown -->
                <div class="relative" x-data="{ showSessions: false }">
                    <button @click="showSessions = !showSessions" class="text-white/80 hover:text-white p-1 rounded transition-colors" title="Sessions">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </button>
                    <div x-show="showSessions" @click.outside="showSessions = false"
                         x-transition
                         class="absolute right-0 bottom-full mb-2 w-64 bg-white rounded-lg shadow-xl border border-gray-200 overflow-hidden z-10">
                        <div class="px-3 py-2 border-b border-gray-100 flex justify-between items-center">
                            <span class="text-xs font-semibold text-gray-500 uppercase">Sessions</span>
                            <button @click="startNewSession(); showSessions = false" class="text-xs text-emerald-600 hover:text-emerald-800 font-medium">+ New</button>
                        </div>
                        <div class="max-h-48 overflow-y-auto">
                            <template x-for="s in sessions" :key="s.id">
                                <button @click="loadSession(s.id); showSessions = false"
                                        class="w-full text-left px-3 py-2 text-sm hover:bg-emerald-50 transition-colors border-b border-gray-50"
                                        :class="s.id === sessionId ? 'bg-emerald-50 text-emerald-700 font-medium' : 'text-gray-700'">
                                    <p class="truncate text-xs" x-text="s.title || ('Session #' + s.id)"></p>
                                    <p class="text-xs text-gray-400" x-text="s.message_count + ' messages'"></p>
                                </button>
                            </template>
                            <p x-show="sessions.length === 0" class="text-xs text-gray-400 px-3 py-2">No sessions yet</p>
                        </div>
                    </div>
                </div>
                <!-- New session -->
                <button @click="startNewSession()" class="text-white/80 hover:text-white p-1 rounded transition-colors" title="New session">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </button>
                <!-- Minimize -->
                <button @click="open = false" class="text-white/80 hover:text-white p-1 rounded transition-colors" title="Minimize">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Messages area -->
        <div x-ref="messages" class="flex-1 overflow-y-auto p-3 space-y-3 bg-gray-50">
            <!-- Empty state -->
            <div x-show="messages.length === 0" class="flex flex-col items-center justify-center h-full text-gray-400">
                <svg class="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <p class="text-xs">Ask me anything about your site</p>
            </div>

            <!-- Messages -->
            <template x-for="(msg, idx) in messages" :key="idx">
                <div>
                    <!-- Steps (tool iterations) -->
                    <template x-if="msg.steps && msg.steps.length > 0">
                        <div class="flex justify-start" x-data="{ showSteps: false }">
                            <div class="max-w-[90%]">
                                <button @click="showSteps = !showSteps" class="flex items-center gap-1 text-xs text-gray-400 hover:text-gray-600 mb-1">
                                    <svg class="w-3 h-3 transition-transform" :class="showSteps ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                    </svg>
                                    <span x-text="msg.steps.length + ' tool step' + (msg.steps.length > 1 ? 's' : '')"></span>
                                </button>
                                <div x-show="showSteps" x-transition class="bg-white border border-gray-200 rounded-lg px-2 py-1.5 space-y-1 text-xs">
                                    <template x-for="step in msg.steps" :key="step.iteration">
                                        <div class="flex items-center gap-1.5">
                                            <span class="text-gray-400 font-mono w-5 text-right shrink-0" x-text="'#' + step.iteration"></span>
                                            <template x-for="a in step.actions" :key="a.tool">
                                                <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium"
                                                      :class="a.success ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                                      x-html="(a.success ? '&#10003; ' : '&#10007; ') + escapeHtml(a.tool)"></span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- User message -->
                    <template x-if="msg.role === 'user'">
                        <div class="flex justify-end">
                            <div class="max-w-[80%] bg-emerald-600 text-white rounded-lg px-3 py-2 shadow-sm">
                                <p class="text-xs whitespace-pre-wrap" x-text="msg.content"></p>
                            </div>
                        </div>
                    </template>

                    <!-- Assistant message -->
                    <template x-if="msg.role === 'assistant'">
                        <div class="flex justify-start">
                            <div class="max-w-[90%] bg-white text-gray-900 rounded-lg px-3 py-2 shadow-sm border border-gray-100">
                                <p class="text-xs whitespace-pre-wrap" x-text="msg.content"></p>
                                <!-- Action chips -->
                                <template x-if="msg.actions && msg.actions.length > 0">
                                    <div class="flex flex-wrap gap-1 mt-1.5">
                                        <template x-for="a in msg.actions" :key="a.tool">
                                            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium"
                                                  :class="a.success ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                                  x-html="(a.success ? '&#10003; ' : '&#10007; ') + escapeHtml(a.tool)"></span>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Confirmation card -->
                    <template x-if="msg.role === 'confirmation'">
                        <div class="flex justify-start">
                            <div class="max-w-[85%] bg-amber-50 border border-amber-200 text-amber-900 rounded-lg px-3 py-2 shadow-sm">
                                <p class="text-xs font-medium mb-2">Confirmation Required</p>
                                <p class="text-xs mb-2" x-text="msg.content"></p>
                                <div class="flex gap-2" x-show="msg.pending">
                                    <button @click="confirmAction()" class="px-3 py-1 bg-red-600 text-white text-xs rounded-lg hover:bg-red-700 font-medium">Confirm</button>
                                    <button @click="cancelAction(idx)" class="px-3 py-1 bg-gray-200 text-gray-700 text-xs rounded-lg hover:bg-gray-300">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Typing indicator -->
            <div x-show="loading" class="flex justify-start">
                <div class="bg-white rounded-lg px-3 py-2 shadow-sm border border-gray-100">
                    <div class="flex items-center space-x-1">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0ms"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:150ms"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:300ms"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="border-t border-gray-200 p-3 bg-white shrink-0">
            <form @submit.prevent="sendMessage()" class="flex items-end gap-2">
                <textarea x-ref="input" x-model="inputText" rows="1"
                          @keydown.enter.prevent="if(!$event.shiftKey) sendMessage()"
                          @input="$el.style.height = 'auto'; $el.style.height = Math.min($el.scrollHeight, 80) + 'px'"
                          class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-emerald-500 focus:border-transparent resize-none"
                          placeholder="Ask about your site..."
                          :disabled="loading"></textarea>
                <button type="submit" :disabled="loading || !inputText.trim()"
                        class="p-2 bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-lg hover:from-emerald-700 hover:to-teal-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function chatWidget() {
    return {
        open: false,
        loading: false,
        hasUnread: false,
        messages: [],
        sessions: [],
        inputText: '',
        sessionId: null,
        pendingConfirmation: null,
        contextLabel: '',

        init() {
            // Restore session from localStorage
            const savedId = localStorage.getItem('chatWidgetSessionId');
            if (savedId) {
                this.sessionId = parseInt(savedId);
                this.loadSession(this.sessionId);
            }
            this.loadSessions();
            this.updateContext();
        },

        // --- Context detection ---
        updateContext() {
            const ctx = window.__chatContext || {};
            const path = window.location.pathname;

            // If template provided explicit context, use it
            if (ctx.pageTitle) {
                this.contextLabel = ctx.section === 'page_edit' ? 'Editing: ' + ctx.pageTitle
                    : ctx.section === 'chat_refine' ? 'Refining: ' + ctx.pageTitle
                    : ctx.section === 'process_images' ? 'Images: ' + ctx.pageTitle
                    : ctx.pageTitle;
            } else if (ctx.section) {
                const labels = {
                    'header_edit': 'Header',
                    'footer_edit': 'Footer',
                    'settings': 'Settings',
                    'media_library': 'Media',
                    'pages_list': 'Pages',
                    'dashboard': 'Dashboard',
                };
                this.contextLabel = labels[ctx.section] || ctx.section;
            } else {
                // Fallback: parse URL
                if (path.match(/\/backoffice\/page\/\d+\/edit\//)) this.contextLabel = 'Page Edit';
                else if (path.match(/\/backoffice\/ai\/chat\/refine\//)) this.contextLabel = 'Chat Refine';
                else if (path.match(/\/backoffice\/settings\/header\//)) this.contextLabel = 'Header';
                else if (path.match(/\/backoffice\/settings\/footer\//)) this.contextLabel = 'Footer';
                else if (path.match(/\/backoffice\/settings\//)) this.contextLabel = 'Settings';
                else if (path.match(/\/backoffice\/media\//)) this.contextLabel = 'Media';
                else if (path.match(/\/backoffice\/pages\//)) this.contextLabel = 'Pages';
                else this.contextLabel = '';
            }
        },

        getActivePageId() {
            const ctx = window.__chatContext || {};
            if (ctx.pageId) return ctx.pageId;
            // Fallback: extract from URL
            const match = window.location.pathname.match(/\/backoffice\/(?:page|ai\/chat\/refine)\/(\d+)/);
            return match ? parseInt(match[1]) : null;
        },

        getContextHint() {
            const ctx = window.__chatContext || {};
            const parts = [];
            if (ctx.section) parts.push('Section: ' + ctx.section);
            if (ctx.pageTitle) parts.push('Page: ' + ctx.pageTitle);
            if (parts.length > 0) return '[User is on: ' + parts.join(', ') + ']';
            // Fallback
            if (this.contextLabel) return '[User is on: ' + this.contextLabel + ']';
            return '';
        },

        // --- Messaging ---
        async sendMessage() {
            const text = this.inputText.trim();
            if (!text || this.loading) return;

            this.inputText = '';
            this.$refs.input.style.height = 'auto';

            // Add user message
            this.messages.push({ role: 'user', content: text });
            this.$nextTick(() => this.scrollToBottom());

            this.loading = true;

            try {
                const payload = {
                    message: text,
                };
                if (this.sessionId) payload.session_id = this.sessionId;

                const pageId = this.getActivePageId();
                if (pageId) payload.active_page_id = pageId;

                // Add context hint to message
                const hint = this.getContextHint();
                if (hint) payload.message = hint + '\n\n' + text;

                const resp = await fetch('/site-assistant/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCookie('csrftoken') },
                    body: JSON.stringify(payload)
                });
                const result = await resp.json();

                if (result.success) {
                    this.sessionId = result.session_id;
                    localStorage.setItem('chatWidgetSessionId', result.session_id);

                    // Update sessions list
                    this.loadSessions();

                    // Handle pending confirmation
                    if (result.pending_confirmation) {
                        this.pendingConfirmation = result.pending_confirmation;
                        this.messages.push({
                            role: 'confirmation',
                            content: result.response,
                            pending: true,
                            steps: result.steps || [],
                        });
                    } else {
                        this.messages.push({
                            role: 'assistant',
                            content: result.response,
                            actions: result.actions || [],
                            steps: result.steps || [],
                        });
                    }

                    if (!this.open) this.hasUnread = true;
                } else {
                    this.messages.push({ role: 'assistant', content: 'Error: ' + (result.error || 'Unknown error') });
                }
            } catch (err) {
                this.messages.push({ role: 'assistant', content: 'Error: ' + err.message });
            }

            this.loading = false;
            this.$nextTick(() => this.scrollToBottom());
        },

        async confirmAction() {
            if (!this.pendingConfirmation || !this.sessionId) return;

            // Mark confirmation as handled
            const confMsg = this.messages.findLast(m => m.role === 'confirmation');
            if (confMsg) confMsg.pending = false;

            this.loading = true;

            try {
                const resp = await fetch('/site-assistant/api/confirm/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCookie('csrftoken') },
                    body: JSON.stringify({
                        session_id: this.sessionId,
                        tool: this.pendingConfirmation.tool,
                        params: this.pendingConfirmation.params
                    })
                });
                const result = await resp.json();

                if (result.success) {
                    this.messages.push({
                        role: 'assistant',
                        content: result.response,
                        actions: result.actions || [],
                    });
                } else {
                    this.messages.push({ role: 'assistant', content: 'Error: ' + (result.error || 'Failed') });
                }
            } catch (err) {
                this.messages.push({ role: 'assistant', content: 'Error: ' + err.message });
            }

            this.pendingConfirmation = null;
            this.loading = false;
            this.$nextTick(() => this.scrollToBottom());
        },

        cancelAction(idx) {
            this.pendingConfirmation = null;
            if (this.messages[idx]) this.messages[idx].pending = false;
            this.messages.push({ role: 'assistant', content: 'Action cancelled.' });
            this.$nextTick(() => this.scrollToBottom());
        },

        // --- Sessions ---
        async loadSessions() {
            try {
                const resp = await fetch('/site-assistant/api/sessions/');
                const result = await resp.json();
                if (result.success) this.sessions = result.sessions;
            } catch (e) { console.error('Failed to load sessions:', e); }
        },

        async loadSession(id) {
            try {
                const resp = await fetch(`/site-assistant/api/sessions/${id}/`);
                const result = await resp.json();
                if (result.success) {
                    this.sessionId = result.session.id;
                    localStorage.setItem('chatWidgetSessionId', result.session.id);
                    // Convert stored messages to widget format
                    this.messages = result.session.messages.map(m => ({
                        role: m.role,
                        content: m.content,
                        actions: m.actions || [],
                        steps: [],
                    }));
                }
            } catch (e) {
                console.error('Failed to load session:', e);
                // If session doesn't exist, clear it
                this.sessionId = null;
                localStorage.removeItem('chatWidgetSessionId');
            }
        },

        startNewSession() {
            this.sessionId = null;
            this.messages = [];
            this.pendingConfirmation = null;
            localStorage.removeItem('chatWidgetSessionId');
            this.$nextTick(() => { if (this.$refs.input) this.$refs.input.focus(); });
        },

        // --- Utilities ---
        scrollToBottom() {
            if (this.$refs.messages) {
                this.$refs.messages.scrollTop = this.$refs.messages.scrollHeight;
            }
        },

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },

        getCookie(name) {
            let v = null;
            if (document.cookie) {
                document.cookie.split(';').forEach(c => {
                    c = c.trim();
                    if (c.startsWith(name + '=')) v = decodeURIComponent(c.substring(name.length + 1));
                });
            }
            return v;
        },
    };
}
</script>
