{% if COOKIE_CONSENT_ENABLED %}
<!-- Cookie Consent Banner -->
<div x-data="{ show: !localStorage.getItem('cookieConsent') }"
     x-show="show"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="translate-y-full opacity-0"
     x-transition:enter-end="translate-y-0 opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="translate-y-0 opacity-100"
     x-transition:leave-end="translate-y-full opacity-0"
     x-cloak
     class="fixed bottom-0 left-0 right-0 z-50 p-4"
     role="dialog"
     aria-label="Cookie consent">
    <div class="max-w-4xl mx-auto bg-gray-900 text-white rounded-xl shadow-2xl p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4">
        <div class="flex-1 text-sm leading-relaxed">
            <span x-show="document.documentElement.lang === 'pt'">
                Este site utiliza cookies para melhorar a sua experiência. Ao continuar a navegar, concorda com a nossa
                <a href="/politica-de-privacidade/" class="underline hover:text-gray-300">política de privacidade</a>.
            </span>
            <span x-show="document.documentElement.lang !== 'pt'">
                This site uses cookies to improve your experience. By continuing to browse, you agree to our
                <a href="/privacy-policy/" class="underline hover:text-gray-300">privacy policy</a>.
            </span>
        </div>
        <div class="flex gap-2 flex-shrink-0">
            <button @click="localStorage.setItem('cookieConsent', 'declined'); show = false"
                    class="px-4 py-2 text-sm text-gray-400 hover:text-white border border-gray-600 hover:border-gray-400 rounded-lg transition">
                <span x-show="document.documentElement.lang === 'pt'">Recusar</span>
                <span x-show="document.documentElement.lang !== 'pt'">Decline</span>
            </button>
            <button @click="localStorage.setItem('cookieConsent', 'accepted'); show = false"
                    class="px-4 py-2 text-sm bg-white text-gray-900 hover:bg-gray-200 rounded-lg font-medium transition">
                <span x-show="document.documentElement.lang === 'pt'">Aceitar</span>
                <span x-show="document.documentElement.lang !== 'pt'">Accept</span>
            </button>
        </div>
    </div>
</div>
{% endif %}
