<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; color: #334155; }
        .container { text-align: center; padding: 2rem; max-width: 480px; }
        .code { font-size: 6rem; font-weight: 800; color: #e2e8f0; line-height: 1; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #1e293b; }
        p { font-size: 1rem; line-height: 1.6; color: #64748b; margin-bottom: 1.5rem; }
        a { display: inline-block; padding: 0.625rem 1.5rem; background: #1e293b; color: #fff; text-decoration: none; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; transition: background 0.2s; }
        a:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">500</div>
        <h1>Something went wrong</h1>
        <p>We're experiencing a technical issue. Please try again in a few moments.</p>
        <a href="/">Go to homepage</a>
    </div>
</body>
</html>
