<!-- Top Header -->
<header class="bg-white shadow-sm">
    <div class="flex items-center justify-between h-16 px-6">
        <!-- Mobile menu button -->
        <button @click="sidebarOpen = !sidebarOpen"
                class="lg:hidden text-gray-600 hover:text-gray-900 focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>

        <!-- Page Title -->
        <h1 class="text-2xl font-semibold text-gray-800 hidden lg:block">
            {% block page_title %}Dashboard{% endblock %}
        </h1>

        <!-- Right side actions -->
        <div class="flex items-center space-x-4">
            <!-- View Site Link -->
            <a href="/" target="_blank"
               class="flex items-center px-4 py-2 text-sm text-gray-700 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
                <span class="hidden sm:inline">View Site</span>
            </a>

            <!-- User avatar (mobile) -->
            <div class="lg:hidden w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-semibold">
                {{ request.user.username|first|upper }}
            </div>
        </div>
    </div>
</header>
