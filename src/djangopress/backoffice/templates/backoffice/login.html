{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Backoffice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Logo/Title -->
            <div class="text-center">
                <h2 class="text-3xl font-bold text-gray-900">{{ SITE_NAME }}</h2>
                <p class="mt-2 text-sm text-gray-600">Backoffice Login</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white rounded-lg shadow-md p-8">
                <form method="post" class="space-y-6">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded">
                        <p class="font-medium">Login failed</p>
                        <p class="text-sm">Please check your username and password.</p>
                    </div>
                    {% endif %}

                    <!-- Username -->
                    <div>
                        <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">
                            Username
                        </label>
                        <input type="text"
                               name="{{ form.username.name }}"
                               id="{{ form.username.id_for_label }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               required autofocus>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>
                        <input type="password"
                               name="{{ form.password.name }}"
                               id="{{ form.password.id_for_label }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               required>
                    </div>

                    <!-- Submit Button -->
                    <div>
                        <button type="submit"
                                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            Sign in
                        </button>
                    </div>

                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>

            <!-- Back to site -->
            <div class="text-center">
                <a href="/" class="text-sm text-blue-600 hover:text-blue-800">
                    ← Back to website
                </a>
            </div>
        </div>
    </div>
</body>
</html>
