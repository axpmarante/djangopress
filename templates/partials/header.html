{% load static i18n %}
<!-- Header Navigation (fallback — navigation is DB-driven via GlobalSection) -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm">
    <nav class="container mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="{% url 'core:home' %}" class="flex items-center">
                    {% if LOGO %}
                        <img src="{{ LOGO.url }}" alt="{{ SITE_NAME }}" class="h-12 w-auto">
                    {% else %}
                        <span class="text-xl font-bold text-gray-900">{{ SITE_NAME }}</span>
                    {% endif %}
                </a>
            </div>

            <!-- Language Switcher -->
            <div class="flex items-center gap-4">
                <form action="{% url 'set_language' %}" method="post" class="inline-block">
                    {% csrf_token %}
                    <input name="next" type="hidden" value="{{ request.path }}">
                    <select name="language" onchange="this.form.submit()" class="bg-gray-100 text-gray-700 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-primary">
                        {% get_current_language as LANGUAGE_CODE %}
                        {% get_available_languages as LANGUAGES %}
                        {% for lang_code, lang_name in LANGUAGES %}
                            <option value="{{ lang_code }}" {% if lang_code == LANGUAGE_CODE %}selected{% endif %}>
                                {{ lang_code|upper }}
                            </option>
                        {% endfor %}
                    </select>
                </form>
            </div>
        </div>
    </nav>
</header>
