{% load static %}

<!-- Editor v2 Top Bar -->
<div id="ev2-topbar" class="ev2-topbar">
  <div class="ev2-topbar-left">
    <div id="ev2-breadcrumbs" class="ev2-breadcrumbs"></div>
  </div>
  <div class="ev2-topbar-right">
    <button id="ev2-undo-btn" class="ev2-topbar-btn" title="Undo (Ctrl+Z)" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 7v6h6"/>
        <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
      </svg>
    </button>
    <button id="ev2-redo-btn" class="ev2-topbar-btn" title="Redo (Ctrl+Shift+Z)" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 7v6h-6"/>
        <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/>
      </svg>
    </button>
    <button id="ev2-save-topbar-btn" class="ev2-topbar-btn ev2-topbar-save-btn" title="Save (Ctrl+S)" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      <span>Save</span>
      <span id="ev2-change-count" class="ev2-change-count hidden">0</span>
    </button>
  </div>
</div>

<!-- Editor v2 Sidebar -->
<div id="ev2-sidebar" class="ev2-sidebar">

  <!-- Language Bar -->
  {% if SITE_LANGUAGES %}
  <div class="ev2-language-bar">
    {% for lang_code, lang_name in SITE_LANGUAGES %}
    <button class="ev2-lang-btn {% if LANGUAGE_CODE == lang_code %}active{% endif %}" data-lang="{{ lang_code }}">
      {{ lang_code|upper }}
    </button>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Tab Bar -->
  <div class="ev2-tabs">
    <button class="ev2-tab active" data-tab="content">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 4h12M2 8h12M2 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Content</span>
    </button>
    <button class="ev2-tab" data-tab="design">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M12 2L14 4L5 13H3V11L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span>Design</span>
    </button>
    <button class="ev2-tab" data-tab="structure">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>Structure</span>
    </button>
    {% if user.is_superuser %}
    <button class="ev2-tab ev2-tab-ai" data-tab="ai">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Chat</span>
    </button>
    {% endif %}
  </div>

  <!-- Tab Content Area -->
  <div id="ev2-tab-content" class="ev2-tab-content">
    <p class="ev2-placeholder">Select an element to edit</p>
  </div>

  <!-- Sidebar Footer -->
  <div class="ev2-sidebar-footer">
    <button id="ev2-save-btn" class="ev2-btn ev2-btn-primary" disabled>Save</button>
    <button id="ev2-discard-btn" class="ev2-btn ev2-btn-secondary" disabled>Discard</button>
    <span id="ev2-status" class="ev2-status">No changes</span>
  </div>

</div>

<!-- Command Palette -->
<div id="ev2-command-palette" class="ev2-command-palette hidden">
  <div class="ev2-command-backdrop"></div>
  <div class="ev2-command-dialog">
    <input id="ev2-command-input" class="ev2-command-input" type="text" placeholder="Type a command..." autocomplete="off" />
    <ul id="ev2-command-results" class="ev2-command-results"></ul>
  </div>
</div>

<!-- Image Modal -->
<div id="ev2-image-modal" class="ev2-image-modal hidden">
  <div class="ev2-image-modal-backdrop"></div>
  <div class="ev2-image-modal-dialog">
    <!-- Header -->
    <div class="ev2-image-modal-header">
      <h3>Select Image</h3>
      <button id="ev2-image-modal-close" class="ev2-image-modal-close" title="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Tabs -->
    <div class="ev2-image-modal-tabs">
      <button class="ev2-image-modal-tab active" data-modal-tab="library">Library</button>
      <button class="ev2-image-modal-tab" data-modal-tab="upload">Upload</button>
    </div>

    <!-- Library Tab -->
    <div id="ev2-image-modal-library" class="ev2-image-modal-body">
      <input id="ev2-image-modal-search" type="text" class="ev2-input" placeholder="Search images..." autocomplete="off" />
      <div id="ev2-image-modal-grid" class="ev2-image-modal-grid"></div>
    </div>

    <!-- Upload Tab -->
    <div id="ev2-image-modal-upload" class="ev2-image-modal-body" style="display:none;">
      <div id="ev2-image-drop-zone" class="ev2-image-drop-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--ev2-text-faint)">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Click or drag an image here</p>
        <p class="ev2-hint">PNG, JPG, GIF, WebP — max 10 MB</p>
        <input id="ev2-image-file-input" type="file" accept="image/*" style="display:none;" />
      </div>
      <div id="ev2-image-upload-preview" class="ev2-image-upload-preview" style="display:none;">
        <img id="ev2-image-upload-thumb" src="" alt="Preview" />
        <div class="ev2-image-upload-fields">
          <div class="ev2-field"><label class="ev2-label">Title</label>
            <input id="ev2-image-upload-title" class="ev2-input" type="text" placeholder="Image title" /></div>
          <div class="ev2-field"><label class="ev2-label">Alt text</label>
            <input id="ev2-image-upload-alt" class="ev2-input" type="text" placeholder="Describe the image" /></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="ev2-image-modal-footer">
      <span id="ev2-image-modal-status" class="ev2-image-modal-status"></span>
      <div class="ev2-image-modal-actions">
        <button id="ev2-image-modal-cancel" class="ev2-btn ev2-btn-secondary">Cancel</button>
        <button id="ev2-image-modal-select" class="ev2-btn ev2-btn-primary" disabled>Select Image</button>
        <button id="ev2-image-modal-upload-btn" class="ev2-btn ev2-btn-primary" style="display:none;" disabled>Upload &amp; Select</button>
      </div>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div id="ev2-context-menu" class="ev2-context-menu hidden"></div>

<!-- Floating Toolbar -->
<div id="ev2-floating-toolbar" class="ev2-floating-toolbar hidden">
  <button class="ev2-floating-btn" data-command="bold" title="Bold">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
      <path d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"/>
      <path d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"/>
    </svg>
  </button>
  <button class="ev2-floating-btn" data-command="italic" title="Italic">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="19" y1="4" x2="10" y2="4"/>
      <line x1="14" y1="20" x2="5" y2="20"/>
      <line x1="15" y1="4" x2="9" y2="20"/>
    </svg>
  </button>
  <button class="ev2-floating-btn" data-command="link" title="Link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
    </svg>
  </button>
</div>
